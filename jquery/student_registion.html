<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="addstudent">
        <h1>Add New Student</h1>

        <label for="name">Name : </label>
        <input type="text" name="name" id="name">
        <br><br>
        <label for="email">Email : </label>
        <input type="email" name="email" id="email">
        <br><br>
        <label for="phone">Phone : </label>
        <input type="number" name="phone" id="phone">
        <br><br>
        <label for="year">Year : </label>
        <select name="year" id="year">
            <option value="">Choose Year</option>
            <option value="First Year">First Year</option>
            <option value="Second Year">Second Year</option>
            <option value="Third Year">Third Year</option>
        </select>
        <br><br>
        <button id="add">Add Student</button>

    </div>

    <table border="1" cellspacing="0" cellpadding="20">
        <thead>
            <tr>
                <th>No.</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Year</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="tbody">

        </tbody>
    </table>



    <script src="jquery.min.js"></script>
    <script>
        $(document).ready(function () {

            function getData() {
                let stuString = localStorage.getItem('myStudents');
                if (stuString) {
                    let stuArray = JSON.parse(stuString);

                    let data = '';
                    let j = 1;
                    $.each(stuArray, function (i, v) {
                        data += `<tr>
                                    <td>${j++}</td>
                                    <td>${v.stu_name}</td>
                                    <td>${v.stu_email}</td>
                                    <td>${v.stu_phone}</td>
                                    <td>${v.stu_year}</td>
                                    <td>
                                        <button>Edit</button>
                                        <button class="delete" data-index="${i}">Delete</button>
                                    </td> 
                            </tr>`;
                    })

                    $('#tbody').html(data);
                }
            }
            getData();

            $('#add').click(function () {
                let name = $('#name').val();
                let email = $('#email').val();
                let phone = $('#phone').val();
                let year = $('#year').val();
                // console.log(name, email, phone, year);

                let stu_obj = {
                    stu_name: name,
                    stu_email: email,
                    stu_phone: phone,
                    stu_year: year
                }
                // console.log(stu_obj);

                let stuString = localStorage.getItem('myStudents');
                let stuArray;

                if (stuString == null) {
                    stuArray = [];
                } else {
                    stuArray = JSON.parse(stuString);
                }

                stuArray.push(stu_obj);

                let stuData = JSON.stringify(stuArray);

                localStorage.setItem('myStudents', stuData);

                $('#name').val('');
                $('#email').val('');
                $('#phone').val('');
                $('#year').val('');

                getData();

            })

            $('#tbody').on('click', '.delete', function () {
                let index = $(this).data('index');
                // console.log(index);

                let stuString = localStorage.getItem('myStudents');
                if (stuString) {
                    let stuArray = JSON.parse(stuString);
                    let ans = confirm('Are you sure want to delete!');

                    if (ans) {
                        stuArray.splice(index, 1);

                        let stuData = JSON.stringify(stuArray);
                        localStorage.setItem('myStudents', stuData);

                        getData();
                    }
                }


            })

        })
    </script>

</body>

</html>
