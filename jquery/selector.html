<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>

    <h1>Jquery Selector</h1>
    <p class="p_tag">Jquery is easy</p>
    <p class="p_tag">Jquery is funny</p>

    <button id="hide">Click</button>
    <button id="show">Show</button>


    <script src="jquery.min.js"></script>

    <script>
        // selector - element, class , id, attribute , *
        // action လုပ်လိုက်တာနဲ့ဖစ်ချင်တာကို callbaxk ထဲမှာရေး

        $(document).ready(function () {
            $('#hide').click(function () {
                // $('h1').hide(function () {
                //     alert('ok');
                // });

                //hide(speed, callback)
                $('h1').hide('slow');
                $('.p_tag').hide('fast');
            })

            $('#show').click(function () {
                $('h1').show(5000);
                $(".p_tag").show('slow');
            })
        })
    </script>
</body>

</html>
